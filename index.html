<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ÌTÀN — Atlas of African Peoples</title>
<meta name="author" content="Israel Adigun & Afolabi Raheem Kehinde">
<meta name="description" content="A living atlas of African peoples, kingdoms and histories — every word fetched live from open archives.">
<meta property="og:type" content="website">
<meta property="og:site_name" content="ÌTÀN — Atlas of African Peoples">
<meta property="og:title" content="ÌTÀN — Atlas of African Peoples">
<meta property="og:description" content="African history told by its peoples — kingdoms, timelines and expeditions, fetched live from the open archive.">
<meta property="og:image" content="https://israel1jol.github.io/itan/og/default.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">

<meta name="twitter:image" content="https://israel1jol.github.io/itan/og/default.png">

<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300..800&family=Spectral:ital,wght@0,300;0,400;0,600;1,400&family=IBM+Plex+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --coal:#191210; --coal-2:#251A14; --coal-3:#33241A;
  --cream:#FFF3DC; --cream-dim:#CDB99A;
  --line:rgba(255,243,220,.16);
  --ink-on-accent:#191210;
  --west:#FFB938; --south:#FF6B57; --horn:#3DDC97;
  --east:#45D8E0; --north:#B388FF; --sahara:#FF9B45;
  --map-shadow:#0C0806; --map-base:#2E2118; --map-mid:#3D2C1E;
  --map-stroke:rgba(255,243,220,.3); --map-contour:rgba(255,185,56,.6); --map-weave:rgba(255,243,220,.05);
  --veil-top:rgba(25,18,16,.2); --veil-bot:rgba(25,18,16,.93);
  --opt-bg:rgba(255,243,220,.04);
  --page-bg:
    radial-gradient(1100px 500px at 50% -150px, rgba(255,107,87,.14), transparent 65%),
    radial-gradient(900px 420px at 85% 8%, rgba(179,136,255,.08), transparent 60%),
    #191210;
  --sun-glow:
    radial-gradient(closest-side at 50% 42%, rgba(255,185,56,.22), transparent 60%),
    radial-gradient(closest-side at 38% 62%, rgba(255,107,87,.16), transparent 62%),
    radial-gradient(closest-side at 66% 56%, rgba(179,136,255,.12), transparent 60%);
}
[data-theme="light"]{
  --coal:#F6ECD9; --coal-2:#FFF9EE; --coal-3:#EDDDBE;
  --cream:#2A1B10; --cream-dim:#71593E;
  --line:rgba(42,27,16,.16);
  --ink-on-accent:#1D130B;
  --west:#B07300; --south:#CE3F2A; --horn:#0E8A55;
  --east:#0A7D89; --north:#6C3FD8; --sahara:#C05708;
  --map-shadow:#CDB78F; --map-base:#E8D6AE; --map-mid:#DFC795;
  --map-stroke:rgba(42,27,16,.4); --map-contour:rgba(176,115,0,.7); --map-weave:rgba(42,27,16,.05);
  --veil-top:rgba(246,236,217,.1); --veil-bot:rgba(246,236,217,.94);
  --opt-bg:rgba(42,27,16,.04);
  --page-bg:
    radial-gradient(1100px 500px at 50% -150px, rgba(206,63,42,.1), transparent 65%),
    radial-gradient(900px 420px at 85% 8%, rgba(108,63,216,.06), transparent 60%),
    #F6ECD9;
  --sun-glow:
    radial-gradient(closest-side at 50% 42%, rgba(176,115,0,.18), transparent 60%),
    radial-gradient(closest-side at 38% 62%, rgba(206,63,42,.12), transparent 62%),
    radial-gradient(closest-side at 66% 56%, rgba(108,63,216,.08), transparent 60%);
}

*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
@media (prefers-reduced-motion:reduce){html{scroll-behavior:auto}*{animation:none!important;transition:none!important}}
body{
  background:var(--page-bg); color:var(--cream);
  font-family:'Spectral',Georgia,serif; line-height:1.65;
  overflow-x:hidden; min-height:100vh; transition:background .35s,color .35s;
}
::selection{background:var(--west);color:var(--coal)}
a{color:var(--west)}
button{font:inherit;cursor:pointer}
img{max-width:100%;display:block}
.mono{font-family:'IBM Plex Mono',monospace}
.glow-rule{height:2px;border:none;margin:34px 0;background:linear-gradient(90deg,transparent,var(--west),var(--south),var(--north),transparent);opacity:.7;border-radius:2px}

/* ---------- shell ---------- */
.shell{max-width:1100px;margin:0 auto;padding:0 22px}
header.top{display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding:22px 0 18px;border-bottom:1px solid var(--line)}
.brand{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:27px;color:var(--cream);text-decoration:none}
.brand b{background:linear-gradient(90deg,var(--west),var(--south));-webkit-background-clip:text;background-clip:text;color:transparent}
.tagline{font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--cream-dim)}
nav.top-nav{margin-left:auto;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.nav-btn{background:var(--opt-bg);border:1px solid var(--line);color:var(--cream);font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.08em;text-transform:uppercase;padding:9px 16px;border-radius:999px;transition:.2s}
.nav-btn:hover{border-color:var(--west);transform:translateY(-1px)}
.nav-btn[aria-current="true"]{border-color:var(--west);background:color-mix(in srgb,var(--west) 14%, transparent)}
.nav-btn:focus-visible{outline:2px solid var(--west);outline-offset:2px}
.progress-chip{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.08em;border:1px solid var(--line);border-radius:999px;padding:8px 14px;color:var(--cream-dim)}
.progress-chip b{color:var(--west)}

/* ---------- hero / map (home) ---------- */
.hero{padding:44px 0 6px;text-align:center}
.hero h1{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:clamp(34px,6.4vw,66px);line-height:1.02}
.hero h1 em{font-style:normal;background:linear-gradient(90deg,var(--west) 0%,var(--south) 45%,var(--north) 100%);-webkit-background-clip:text;background-clip:text;color:transparent}
.hero p{max-width:560px;margin:14px auto 0;color:var(--cream-dim);font-size:17px}
.hero p b{color:var(--cream)}
.scene-wrap{position:relative;margin:10px auto 0;max-width:760px}
.sun{position:absolute;inset:-8% -12%;z-index:0;pointer-events:none;border-radius:50%;background:var(--sun-glow);animation:sunpulse 7s ease-in-out infinite}
@keyframes sunpulse{0%,100%{opacity:.85;transform:scale(1)}50%{opacity:1;transform:scale(1.04)}}
.scene{perspective:1200px;position:relative;z-index:1;touch-action:pan-y}
.map-stack{position:relative;transform-style:preserve-3d;transition:transform .25s ease-out;aspect-ratio:1000/1100;margin:0 auto}
.layer{position:absolute;inset:0;transform-style:preserve-3d}
.layer svg{width:100%;height:100%;overflow:visible}
.l-shadow{transform:translateZ(-70px) scale(1.02);filter:blur(16px);opacity:.6}
.l-base{transform:translateZ(0)}
.l-mid{transform:translateZ(34px);opacity:.45}
.l-top{transform:translateZ(64px)}
.l-pins{transform:translateZ(92px)}
.pin{position:absolute;transform:translate(-50%,-50%);background:transparent;border:none;color:var(--cream);display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px}
.pin .dot{width:14px;height:14px;border-radius:50%;background:var(--pc,var(--west));box-shadow:0 0 0 4px color-mix(in srgb,var(--pc,var(--west)) 28%, transparent),0 0 16px var(--pc,var(--west));animation:breathe 3.2s ease-in-out infinite;position:relative}
.pin.visited .dot::after{content:"✓";position:absolute;inset:0;display:grid;place-items:center;font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:700;color:var(--ink-on-accent)}
.pin:nth-child(odd) .dot{animation-delay:1.4s}
@keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.3)}}
.pin .tag{font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;background:var(--coal-2);border:1px solid var(--pc,var(--west));padding:3px 8px;border-radius:4px;opacity:0;transform:translateY(-4px);transition:.18s;white-space:nowrap;color:var(--pc,var(--west))}
.pin:hover .tag,.pin:focus-visible .tag{opacity:1;transform:translateY(0)}
.pin:focus-visible .dot{outline:2px solid var(--cream);outline-offset:3px}
@media (hover:none), (max-width:640px){
  .pin{padding:10px}
  .pin .dot{width:10px;height:10px;box-shadow:0 0 0 3px color-mix(in srgb,var(--pc,var(--west)) 30%, transparent),0 0 10px var(--pc,var(--west))}
  .pin .tag{display:none}
  @keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.18)}}
}
.pin-chip{position:absolute;z-index:5;transform:translate(-50%,-130%);background:var(--coal-2);border:1.5px solid var(--pc,var(--west));border-radius:10px;padding:10px 12px;display:flex;align-items:center;gap:10px;box-shadow:0 10px 30px rgba(0,0,0,.35)}
.pin-chip .nm{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:15px}
.pin-chip .go{background:var(--pc,var(--west));color:var(--ink-on-accent);border:none;border-radius:999px;font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700;letter-spacing:.06em;padding:7px 12px;text-transform:uppercase}
.map-hint{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--cream-dim);text-align:center;margin-top:8px}

/* ---------- sections / cards ---------- */
.section-head{display:flex;align-items:baseline;gap:14px;margin:54px 0 18px;flex-wrap:wrap}
.section-head h2{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:clamp(22px,3.6vw,32px)}
.section-head .k{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--west)}
.section-head .right{margin-left:auto}
.rail{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}
.card{background:var(--coal-2);border:1px solid var(--line);border-top:3px solid var(--pc,var(--west));border-radius:12px;overflow:hidden;text-align:left;color:var(--cream);padding:0;display:flex;flex-direction:column;transition:transform .2s,box-shadow .2s}
.card:hover{transform:translateY(-5px);box-shadow:0 14px 34px rgba(0,0,0,.25),0 0 0 1px var(--pc,var(--west))}
.card:focus-visible{outline:2px solid var(--pc,var(--west));outline-offset:2px}
.card .thumb{height:140px;background:var(--coal-3);position:relative;overflow:hidden}
.card .thumb img{width:100%;height:100%;object-fit:cover;transition:transform .35s}
.card:hover .thumb img{transform:scale(1.06)}
.card .body{padding:14px 16px 16px}
.card h3{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:19px;margin-bottom:3px}
.card .region{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--pc,var(--west))}
.card p{font-size:13.5px;color:var(--cream-dim);margin-top:8px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.card .seen{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--pc,var(--west));margin-top:8px}

.status{font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--cream-dim);padding:34px 0;text-align:center}
.status .spin{display:inline-block;width:14px;height:14px;border:2px solid var(--west);border-right-color:transparent;border-radius:50%;animation:rot 1s linear infinite;vertical-align:-2px;margin-right:10px}
@keyframes rot{to{transform:rotate(360deg)}}
.notice{border:1px solid var(--south);background:color-mix(in srgb,var(--south) 10%, transparent);padding:14px 18px;border-radius:10px;font-size:14px;margin:18px 0}

/* ---------- profile / expedition ---------- */
.p-hero{position:relative;min-height:340px;border-radius:16px;overflow:hidden;border:1px solid var(--line);margin-top:26px;display:flex;align-items:flex-end;box-shadow:0 0 60px color-mix(in srgb,var(--rc,var(--west)) 18%, transparent)}
.p-hero .bg{position:absolute;inset:0;background-size:cover;background-position:center 30%;transform:scale(1.06);will-change:transform}
.p-hero .veil{position:absolute;inset:0;background:linear-gradient(180deg,var(--veil-top) 0%,var(--veil-bot) 88%)}
.p-hero .edge{position:absolute;left:0;right:0;top:0;height:5px;background:linear-gradient(90deg,var(--rc,var(--west)),transparent)}
.p-hero .inner{position:relative;padding:28px;width:100%}
.p-hero h1{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:clamp(34px,6vw,58px);line-height:1}
.p-hero .desc{color:var(--cream-dim);font-size:16px;margin-top:6px;max-width:640px}
.p-hero .meta{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--rc,var(--west));margin-bottom:8px}

/* expedition HUD */
.hud{
  position:fixed;right:14px;bottom:14px;z-index:60;
  background:var(--coal-2);border:1.5px solid var(--rc,var(--west));border-radius:14px;
  padding:10px 14px;box-shadow:0 12px 34px rgba(0,0,0,.4);
  display:flex;flex-direction:column;gap:6px;min-width:190px;
}
.hud .rank{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:15px;display:flex;align-items:center;gap:8px}
.hud .rank .snd{margin-left:auto;background:none;border:none;font-size:15px;opacity:.8}
.hud .xpline{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.08em;color:var(--cream-dim);display:flex;justify-content:space-between}
.hud .xpbar{height:7px;background:var(--coal-3);border-radius:99px;overflow:hidden}
.hud .xpbar i{display:block;height:100%;width:0%;background:linear-gradient(90deg,var(--rc,var(--west)),var(--south));border-radius:99px;transition:width .4s}
.hud .sat{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.08em;color:var(--rc,var(--west))}

.toast{
  position:fixed;left:50%;bottom:90px;transform:translate(-50%,20px);z-index:70;
  background:var(--coal-2);border:1.5px solid var(--west);border-radius:999px;
  font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.06em;
  padding:10px 18px;opacity:0;transition:.25s;pointer-events:none;box-shadow:0 10px 30px rgba(0,0,0,.4);
}
.toast.show{opacity:1;transform:translate(-50%,0)}

/* chapters */
.chap{border:1px solid var(--line);border-radius:16px;background:color-mix(in srgb,var(--coal-2) 70%, transparent);margin:26px 0;overflow:hidden}
.chap-head{display:flex;align-items:center;gap:12px;padding:18px 20px;border-bottom:1px solid var(--line);flex-wrap:wrap}
.chap-head .num{
  font-family:'IBM Plex Mono',monospace;font-weight:700;font-size:12px;color:var(--ink-on-accent);
  background:var(--rc,var(--west));border-radius:8px;padding:5px 9px;
}
.chap-head h2{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:clamp(19px,3vw,25px)}
.chap-head .done{margin-left:auto;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.1em;color:var(--cream-dim)}
.chap-head .done.yes{color:var(--horn)}
.chap-body{padding:20px}
.chap-sub{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--cream-dim);margin-bottom:14px}

.prose{max-width:720px;margin:0 auto;font-size:17px}
.prose .lede{font-size:21px;line-height:1.55}
.prose .lede::first-letter{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:3em;float:left;line-height:.82;margin:4px 10px 0 0;color:var(--rc,var(--west))}
.prose p{margin-bottom:16px}
.reveal{border:1px solid var(--line);border-radius:12px;background:var(--coal-2);margin:14px 0;overflow:hidden}
.reveal summary{list-style:none;display:flex;align-items:center;gap:12px;padding:16px 18px;cursor:pointer;font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:18px}
.reveal summary::-webkit-details-marker{display:none}
.reveal summary .xp-hint{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--rc,var(--west));border:1px solid var(--rc,var(--west));border-radius:99px;padding:2px 8px}
.reveal summary .arrow{margin-left:auto;color:var(--rc,var(--west));transition:transform .2s;font-family:'IBM Plex Mono',monospace}
.reveal[open] summary .arrow{transform:rotate(90deg)}
.reveal summary:hover{background:var(--opt-bg)}
.reveal .inner{padding:0 18px 18px;color:var(--cream);font-size:16px}
.reveal .inner p{margin-bottom:14px}
.read-more{font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.08em}

/* artifact words */
.art{
  background:none;border:none;padding:0 2px;color:var(--rc,var(--west));font:inherit;
  border-bottom:2px dashed var(--rc,var(--west));cursor:pointer;border-radius:2px;
  animation:artglow 2.6s ease-in-out infinite;
}
@keyframes artglow{0%,100%{text-shadow:0 0 0 transparent}50%{text-shadow:0 0 14px color-mix(in srgb,var(--rc,var(--west)) 70%, transparent)}}
.art.got{border-bottom-style:solid;animation:none;opacity:.9}
.art.got::after{content:" ✦";font-size:.8em}
.sheet-wrap{position:fixed;inset:0;z-index:80;background:rgba(0,0,0,.45);display:flex;align-items:flex-end;justify-content:center}
.sheet{
  background:var(--coal-2);border:1.5px solid var(--rc,var(--west));border-radius:18px 18px 0 0;
  width:min(560px,100%);max-height:72vh;overflow:auto;padding:20px 22px 26px;
  animation:sheetup .25s ease-out;
}
@keyframes sheetup{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
.sheet .s-kind{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--rc,var(--west))}
.sheet h3{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:23px;margin:4px 0 10px}
.sheet img{border-radius:10px;max-height:180px;object-fit:cover;width:100%;margin-bottom:12px}
.sheet p{font-size:15.5px;margin-bottom:12px}
.sheet .s-close{background:var(--rc,var(--west));color:var(--ink-on-accent);border:none;border-radius:999px;font-family:'IBM Plex Mono',monospace;font-weight:700;font-size:12px;letter-spacing:.08em;text-transform:uppercase;padding:11px 20px}

/* time machine */
.tm{padding:4px 0}
.tm-year{
  font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:clamp(34px,6vw,52px);
  text-align:center;color:var(--rc,var(--west));line-height:1;margin-bottom:6px;font-variant-numeric:tabular-nums;
}
.tm-sub{text-align:center;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--cream-dim);margin-bottom:14px}
.tm input[type=range]{width:100%;accent-color:var(--rc,var(--west));height:30px}
.tm-rows{margin-top:14px}
.tm-row{display:grid;grid-template-columns:150px 1fr;gap:12px;align-items:center;margin-bottom:9px}
.tm-row .nm{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--cream-dim);transition:color .2s}
.tm-row .track{position:relative;height:14px;background:var(--coal-3);border-radius:99px}
.tm-row .bar{position:absolute;height:100%;border-radius:99px;background:var(--coal);border:1px solid var(--line);transition:.25s;min-width:6px}
.tm-row.alive .nm{color:var(--cream);font-weight:700}
.tm-row.alive .bar{background:linear-gradient(90deg,color-mix(in srgb,var(--rc,var(--west)) 70%, #000 8%),var(--rc,var(--west)));box-shadow:0 0 14px color-mix(in srgb,var(--rc,var(--west)) 55%, transparent);border-color:transparent}
.tm-row .stamp{position:absolute;right:8px;top:-1px;font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--cream-dim)}
.tm-q{margin-top:18px;border-top:1px dashed var(--line);padding-top:16px}
.tm-q h4{font-family:'Bricolage Grotesque',sans-serif;font-size:18px;margin-bottom:10px}
.tm-opts{display:flex;gap:10px;flex-wrap:wrap}
.tm-opt{background:var(--opt-bg);border:1.5px solid var(--line);color:var(--cream);border-radius:999px;padding:11px 22px;font-size:16px;transition:.15s}
.tm-opt:hover:not([disabled]){border-color:var(--rc,var(--west))}
.tm-opt.right{border-color:var(--horn);background:color-mix(in srgb,var(--horn) 14%, transparent)}
.tm-opt.wrong{border-color:var(--south);background:color-mix(in srgb,var(--south) 14%, transparent)}
.tm-verdict{margin-top:10px;font-size:14.5px;color:var(--cream-dim)}

/* memory match */
.mm-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:10px;max-width:560px}
.mm-card{aspect-ratio:3/4;perspective:600px;background:none;border:none;padding:0}
.mm-in{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform .4s}
.mm-card.flip .mm-in{transform:rotateY(180deg)}
.mm-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:12px;border:1.5px solid var(--line);display:flex;align-items:center;justify-content:center;overflow:hidden;padding:8px;text-align:center}

/* ---------- theme: follows the device, dark by default ---------- */
function applyTheme(){
  document.documentElement.dataset.theme =
    matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
}
applyTheme();
matchMedia('(prefers-color-scheme: light)').addEventListener('change', applyTheme);
/* ---------- sound (synth, no assets) ---------- */
let AC=null, soundOn=true;
function tone(freq, t0, dur, type='sine', vol=.07){
  const o=AC.createOscillator(), g=AC.createGain();
  o.type=type; o.frequency.value=freq;
  g.gain.setValueAtTime(vol, AC.currentTime+t0);
  g.gain.exponentialRampToValueAtTime(.0001, AC.currentTime+t0+dur);
  o.connect(g).connect(AC.destination);
  o.start(AC.currentTime+t0); o.stop(AC.currentTime+t0+dur+.02);
}
function sfx(kind){
  if(!soundOn) return;
  try{
    if(!AC) AC = new (window.AudioContext||window.webkitAudioContext)();
    if(AC.state==='suspended') AC.resume();
    if(kind==='collect'){ tone(880,0,.12); tone(1320,.08,.14); }
    if(kind==='right'){ tone(523,0,.1); tone(659,.08,.1); tone(784,.16,.18); }
    if(kind==='wrong'){ tone(196,0,.2,'sawtooth',.05); }
    if(kind==='rank'){ [523,659,784,1047].forEach((f,i)=>tone(f,i*.09,.16)); }
    if(kind==='win'){ [523,659,784,1047,1319].forEach((f,i)=>tone(f,i*.1,.22)); }
    if(kind==='tick'){ tone(1200,0,.04,'square',.025); }
  }catch(e){}
}

/* ---------- state ---------- */
const visited = new Set();
const EXPED = new Map(); // per-people expedition progress (session)
function exped(title){
  if(!EXPED.has(title)) EXPED.set(title,{
    xp:0, collected:new Set(), reveals:new Set(),
    ch:{story:false, time:false, build:false, light:false},
    badges:new Set(), tmWins:0, celebrated:false
  });
  return EXPED.get(title);
}
const RANKS = [[0,'Wanderer 🌱'],[60,'Pathfinder 🧭'],[140,'Chronicler 📜'],[240,'Griot 👑']];
const rankFor = xp => RANKS.reduce((a,r)=>xp>=r[0]?r[1]:a, RANKS[0][1]);

/* ---------- API helpers ---------- */
const cache = new Map();
async function getJSON(url, opts){
  if(cache.has(url)) return cache.get(url);
  const r = await fetch(url, opts);
  if(!r.ok) throw new Error('HTTP '+r.status);
  const j = await r.json();
  cache.set(url, j);
  return j;
}
const summary = t => getJSON('https://en.wikipedia.org/api/rest_v1/page/summary/'+encodeURIComponent(t));
const extract = async t => {
  const j = await getJSON('https://en.wikipedia.org/w/api.php?action=query&prop=extracts&explaintext=1&exsectionformat=wiki&redirects=1&format=json&origin=*&titles='+encodeURIComponent(t));
  const pages = j.query && j.query.pages;
  const pg = pages && pages[Object.keys(pages)[0]];
  return (pg && pg.extract) || '';
};
async function sparql(q){
  return getJSON('https://query.wikidata.org/sparql?format=json&query='+encodeURIComponent(q),
    {headers:{'Accept':'application/sparql-results+json'}});
}
const wikiURL = t => 'https://en.wikipedia.org/wiki/'+encodeURIComponent(t.replace(/ /g,'_'));

/* ---------- utilities ---------- */
const esc = s => String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const rxEsc = s => s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
const yearOf = v => { const m = /^(-?\d+)/.exec(v); return m ? parseInt(m[1],10) : null; };
const fmtYear = y => y==null ? '—' : (y<0 ? (-y)+' BCE' : y+' CE');
const shuffle = a => { a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; };
function sections(text){
  const parts = text.split(/\n==([^=].*?)==\n/);
  const out = [{h:'Overview', b:parts[0].trim()}];
  for(let i=1;i<parts.length;i+=2){
    out.push({h:parts[i].trim(), b:(parts[i+1]||'').replace(/\n===.*?===\n/g,'\n').trim()});
  }
  return out;
}
const WANT = ['history','origin','origins','precolonial','pre-colonial','culture','religion','society','language','art'];
const pickSections = secs => secs.filter(s => WANT.some(w => s.h.toLowerCase().includes(w)) && s.b.length>200).slice(0,3);
function clip(s,n){ if(s.length<=n) return s; const cut=s.slice(0,n); return cut.slice(0,cut.lastIndexOf('. ')+1) || cut; }
const paras = s => s.split(/\n+/).filter(p=>p.trim().length>0);
function firstSentences(s, n){
  const m = s.match(/[^.!?]+[.!?]+(\s|$)/g) || [s];
  return { head: m.slice(0,n).join('').trim(), rest: m.slice(n).join('').trim() };
}
const FAIL_NOTE = `<div class="notice"><b>The archive couldn't be reached.</b> If you're viewing this in a sandboxed preview, external requests may be blocked — open the file in your browser or visit the deployed site.</div>`;

function confettiBurst(x, y){
  if(matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  const colors = ['#FFB938','#FF6B57','#3DDC97','#45D8E0','#B388FF','#FF9B45'];
  for(let i=0;i<26;i++){
    const c = document.createElement('i');
    c.className = 'confetti';
    c.style.cssText = `left:${x + (Math.random()*120-60)}px;top:${y-10}px;background:${colors[i%6]};animation-delay:${Math.random()*0.18}s`;

    setTimeout(()=>c.remove(), 1400);
  }
}

function slugOf(name){ return name.toLowerCase(); }
function shareBar(text, sharePath){
  const url = new URL(sharePath, location.href).href;

    <button class="share-btn" data-share="native" data-text="${esc(text)}" data-url="${esc(url)}">Share 📤</button>

       href="https://twitter.com/intent/tweet?text=${enc(text)}&url=${enc(url)}">X</a>

}

function bindShare(scope){
  scope.querySelectorAll('[data-share="native"]').forEach(b=>{
    b.addEventListener('click', async ()=>{
      const url = b.dataset.url;
      const text = b.dataset.text;
      if(navigator.share){
        try{ await navigator.share({title:'ÌTÀN', text, url}); }catch(e){}
      } else {
        try{ await navigator.clipboard.writeText(text+' '+url); toast('Copied to clipboard 📋'); }catch(e){}
      }
    });
  });
}

/* ---------- map ---------- */
function mapSVG(fillVar, strokeVar, sw, weave){
  const fillStyle = fillVar==='none' ? 'fill:none' : `fill:${fillVar}`;
  const strokeStyle = strokeVar==='none' ? '' : `;stroke:${strokeVar};stroke-width:${sw};stroke-linejoin:round`;
  const weaveRect = weave ? `<path d="${AFRICA}" style="fill:url(#weave)"/><path d="${MADAGASCAR}" style="fill:url(#weave)"/>` : '';
  return `<svg viewBox="0 0 1000 1100" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    ${weave?`<defs><pattern id="weave" width="26" height="26" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="13" height="26" style="fill:var(--map-weave)"/>
    </pattern></defs>`:''}
    <path d="${AFRICA}" style="${fillStyle}${strokeStyle}"/>
    <path d="${MADAGASCAR}" style="${fillStyle}${strokeStyle}"/>
    ${weaveRect}
  </svg>`;
}

function drawHUD(){

/* artifact words: wrap known names inside escaped text with tappable buttons */
function linkArtifacts(escapedText, candidates){
  let out = escapedText;
  candidates.forEach(c=>{
    const e = esc(c);
    const rx = new RegExp('(^|[^\\w>])('+rxEsc(e)+')(?![\\w<])','i');
    if(rx.test(out)){
      out = out.replace(rx, (m,pre,word)=>`${pre}<button class="art${EX.collected.has(c)?' got':''}" data-art="${e}">${word}</button>`);
    }
  });
  return out;
}

/* ---------- CH2: time machine ---------- */
function buildTimeMachine(reg, dates, rc){
  const tm = document.getElementById('timemachine');
  const dated = (dates||[]).filter(d=>d.start!=null);
  if(!dated.length){ tm.innerHTML = `<p>The archive holds no dates for these chronicles yet — chapter auto-completed.</p>`; markChapter('time'); return; }
  const NOW = new Date().getFullYear();
  const min = Math.min(...dated.map(d=>d.start));
  const max = Math.max(...dated.map(d=>d.end!=null?d.end:NOW));
  let yr = Math.round((min+max)/2);

  tm.innerHTML = `<div class="tm">
    <div class="tm-year" id="tm-year"></div>
    <div class="tm-sub">Drag through time — watch what stands and what falls</div>
    <input type="range" id="tm-range" min="${min}" max="${max}" value="${yr}" aria-label="Year dial">
    <div class="tm-rows" id="tm-rows"></div>
    <div class="tm-q" id="tm-q"></div>
  </div>`;

  const span = Math.max(max-min,1);
  const rows = document.getElementById('tm-rows');
  rows.innerHTML = dated.map((d,i)=>{
    const e = d.end!=null?d.end:NOW;
    return `<div class="tm-row" data-i="${i}">
      <span class="nm">${esc(d.name)}</span>
      <span class="track"><span class="bar" style="left:${((d.start-min)/span*100)}%;width:${Math.max(((e-d.start)/span*100),1.5)}%"></span>
      <span class="stamp">${fmtYear(d.start)}${d.end!=null?'–'+fmtYear(d.end):'–now'}</span></span>
    </div>`;
  }).join('');

  const yearEl = document.getElementById('tm-year');
  function paint(){
    yearEl.textContent = fmtYear(yr);
    dated.forEach((d,i)=>{
      const alive = yr>=d.start && yr<=(d.end!=null?d.end:NOW);
      rows.querySelector(`[data-i="${i}"]`).classList.toggle('alive', alive);
    });
  }
  paint();
  document.getElementById('tm-range').addEventListener('input', e=>{
    yr = +e.target.value; paint(); sfx('tick');
  });

  /* riddle */
  const qEl = document.getElementById('tm-q');
  function riddle(){
    const d = shuffle(dated)[0];
    const end = d.end!=null?d.end:NOW;
    const inside = Math.random()<.5;
    let y;
    if(inside) y = d.start + Math.floor(Math.random()*Math.max(end-d.start,1));
    else {
      y = Math.random()<.5 ? d.start - (40+Math.floor(Math.random()*300)) : end + (40+Math.floor(Math.random()*300));
      y = Math.max(min-400, Math.min(max+400, y));
    }
    const truth = y>=d.start && y<=end;
    qEl.innerHTML = `<h4>⏳ Time riddle: in ${fmtYear(y)}, was ${esc(d.name)} standing?</h4>
      <div class="tm-opts"><button class="tm-opt" data-v="1">Yes, it stood</button><button class="tm-opt" data-v="0">No, not yet / no more</button></div>
      <div class="tm-verdict" id="tm-v"></div>`;
    qEl.querySelectorAll('.tm-opt').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        const guess = btn.dataset.v==='1';
        qEl.querySelectorAll('.tm-opt').forEach(b=>{
          b.disabled=true;
          if((b.dataset.v==='1')===truth) b.classList.add('right');
        });
        const v = document.getElementById('tm-v');
        if(guess===truth){
          sfx('right');
          EX.tmWins++;
          if(EX.tmWins<=3) addXP(20,'time riddle solved');
          if(EX.tmWins===3) badge('Time Traveler ⏳');
          markChapter('time');
          const r = btn.getBoundingClientRect();
          confettiBurst(r.left+r.width/2, r.top);
          v.innerHTML = `Correct! ${esc(d.name)}: ${fmtYear(d.start)} – ${d.end!=null?fmtYear(d.end):'today'}. <button class="tm-opt" id="tm-again" style="margin-left:8px">Another riddle ↻</button>`;
        } else {
          sfx('wrong');
          v.innerHTML = `Not quite — ${esc(d.name)} stood from ${fmtYear(d.start)} to ${d.end!=null?fmtYear(d.end):'today'}. <button class="tm-opt" id="tm-again" style="margin-left:8px">Try another ↻</button>`;
        }
        document.getElementById('tm-again').addEventListener('click', riddle);
      });
    });
  }
  riddle();
}

/* ---------- CH3: kingdoms + timeline + memory match ---------- */
function buildKingdoms(reg, sums, dates, rc){
  const grid = document.getElementById('kgrid');
  grid.className = 'dossier';
  grid.innerHTML = '';
  sums.forEach((res,i)=>{
    const t = reg.k[i];
    const el = document.createElement('div');
    el.className = 'd-row';
    const num = String(i+1).padStart(2,'0');
    if(res.status==='fulfilled'){
      const ks = res.value;
      const d = dates && dates.find(x=>x.title===t);
      el.innerHTML = `<span class="d-num">${num}</span>
        <div class="d-thumb">${ks.thumbnail?`<img src="${esc(ks.thumbnail.source)}" alt="" loading="lazy">`:''}</div>
        <div class="d-body"><h4>${esc(ks.title||t)}</h4>
        <div class="dates">${d&&d.start!=null?fmtYear(d.start)+(d.end!=null?' — '+fmtYear(d.end):' — present'):'in the record'}</div>
        <p>${esc(clip(ks.extract||'',220))}</p>
        <a href="${wikiURL(t)}" rel="noopener">Full record →</a></div>`;
    } else {
      el.innerHTML = `<span class="d-num">${num}</span><div class="d-thumb"></div>
        <div class="d-body"><h4>${esc(t)}</h4><p>Record unavailable right now.</p></div>`;
    }
    grid.appendChild(el);
  });
}

function buildMemory(reg, sums, dates, rc){
  const box = document.getElementById('memory');
  /* pairs: name ↔ image where available, else name ↔ founding year */
  const pairs = [];
  sums.forEach((res,i)=>{
    const t = reg.k[i];
    const short = t.length>18 ? t.split(' ').slice(0,2).join(' ') : t;
    if(res.status==='fulfilled' && res.value.thumbnail){
      pairs.push({id:i, a:{type:'name', v:short}, b:{type:'img', v:res.value.thumbnail.source, lbl:short}});
    } else {
      const d = dates && dates.find(x=>x.title===t);
      if(d && d.start!=null) pairs.push({id:i, a:{type:'name', v:short}, b:{type:'txt', v:'Founded '+fmtYear(d.start), lbl:short}});
    }
  });
  if(pairs.length<2){ box.innerHTML=''; markChapter('build'); return; }

  box.innerHTML = `<div class="mm-panel"><div class="mm-head"><span class="k">Mini-game</span><h4>🃏 Memory of the Builders</h4></div>
  <p class="chap-sub">Match each name to its record — fewest flips wins</p>
    <div class="mm-grid" id="mm"></div><div class="mm-stats" id="mm-stats">FLIPS: 0</div>`;
  const cards = shuffle(pairs.flatMap(p=>[
    {pid:p.id, face:p.a},
    {pid:p.id, face:p.b}
  ]));
  const mm = document.getElementById('mm');
  let open=[], lock=false, flips=0, matched=0;
  cards.forEach((c,n)=>{
    const el = document.createElement('button');
    el.className = 'mm-card';
    el.dataset.pid = c.pid;
    const backInner = c.face.type==='img'
      ? `<img src="${esc(c.face.v)}" alt=""><span class="lbl">${esc(c.face.lbl)}</span>`
      : c.face.type==='txt' ? `<span class="lbl">${esc(c.face.v)}</span><span class="lbl">${esc(c.face.lbl)}</span>`
      : `<span class="lbl" style="font-family:'Bricolage Grotesque',sans-serif;font-size:14px">${esc(c.face.v)}</span>`;
    el.innerHTML = `<div class="mm-in"><div class="mm-face mm-front">?</div><div class="mm-face mm-back">${backInner}</div></div>`;
    el.addEventListener('click', ()=>{
      if(lock || el.classList.contains('flip') || el.classList.contains('matched')) return;
      el.classList.add('flip'); sfx('tick');
      open.push(el);
      if(open.length===2){
        flips++; document.getElementById('mm-stats').textContent = 'FLIPS: '+flips;
        lock=true;
        const [x,y2] = open;
        if(x.dataset.pid===y2.dataset.pid){
          setTimeout(()=>{
            x.classList.add('matched'); y2.classList.add('matched');
            sfx('right'); matched++;
            open=[]; lock=false;
            if(matched===pairs.length){
              addXP(25,'memory of the builders');
              badge('Master Matcher 🃏');
              markChapter('build');
              const r = mm.getBoundingClientRect();
              confettiBurst(r.left+r.width/2, r.top+60);
            }
          }, 350);
        } else {
          setTimeout(()=>{ x.classList.remove('flip'); y2.classList.remove('flip'); open=[]; lock=false; sfx('wrong'); }, 800);
        }
      }
    });
    mm.appendChild(el);
  });
}

/* ---------- CH4: lightning round ---------- */
async function startLightning(reg, rc){
  const box = document.getElementById('lightning');
  box.innerHTML = `<div class="status"><span class="spin"></span>Forging questions from the live archive…</div>`;
  let qs;
  try{
    qs = await buildQuestions(reg.title, 12);
    if(qs.length<3) qs = await buildQuestions(null, 12); /* widen if scope data is thin */
  }catch(e){ box.innerHTML = FAIL_NOTE; return; }

  let i=0, ok=0, total=0, t=45, timer=null, done=false;
  function frame(){
    box.innerHTML = `
      <div class="lr-score"><span>⚡ <b>${ok}</b> correct</span><span><b>${total}</b> answered</span><span><b>${t}</b>s left</span></div>
      <div class="lr-timebar"><i style="width:${(t/45)*100}%"></i></div>
      <div class="lr-q" id="lrq"></div>`;
    drawQ();
  }
  function drawQ(){
    const q = qs[i % qs.length];
    const el = document.getElementById('lrq');
    el.innerHTML = `<h4>${esc(q.text)}</h4>
      <div class="lr-opts">${q.opts.map(o=>`<button class="lr-opt">${esc(o)}</button>`).join('')}</div>`;
    el.querySelectorAll('.lr-opt').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        if(done) return;
        const right = btn.textContent===q.answer;
        el.querySelectorAll('.lr-opt').forEach(b=>{ b.disabled=true; if(b.textContent===q.answer) b.classList.add('right'); });
        if(right){ ok++; sfx('right'); const r=btn.getBoundingClientRect(); confettiBurst(r.left+r.width/2, r.top); }
        else { btn.classList.add('wrong'); sfx('wrong'); }
        total++; i++;
        setTimeout(()=>{ if(!done) frame(); }, right?420:780);
      });
    });
  }
  function finish(){
    done = true; clearInterval(timer);
    const xp = ok*5;
    if(xp>0) addXP(xp, `lightning: ${ok} correct`);
    if(ok>=8) badge('Storm Caller ⚡');
    markChapter('light');
    box.innerHTML = `
      <div class="q-final" style="padding:20px 0">
        <div class="big">${ok} ⚡</div>
        <p style="margin:8px 0 18px">${ok} correct out of ${total} in 45 seconds${ok>=8?' — storm caller!':''}</p>
        <button class="lr-start" id="lr-again">Run it back ⚡</button>
        ${shareBar(`${ok} correct in 45 seconds on the ÌTÀN Lightning Round ⚡ Beat that.`,
      `share/${slugOf(reg.name)}.html?go=quiz`)}
      </div>`;
    bindShare(box);
    if(ok>=5){ sfx('win'); confettiBurst(innerWidth/2, innerHeight/2); }
    document.getElementById('lr-again').addEventListener('click', ()=>startLightning(reg, rc));
  }
  timer = setInterval(()=>{
    t--;
    const bar = box.querySelector('.lr-timebar i');
    const sc = box.querySelector('.lr-score');
    if(bar) bar.style.width = (t/45)*100+'%';
    if(sc) sc.innerHTML = `<span>⚡ <b>${ok}</b> correct</span><span><b>${total}</b> answered</span><span><b>${t}</b>s left</span>`;
    if(t<=5 && t>0) sfx('tick');
    if(t<=0) finish();
  }, 1000);
  frame();
}

async function fetchDates(titles){
  const key = 'dates:'+titles.join('|');
  if(cache.has(key)) return cache.get(key);
  const values = titles.map(t=>`<https://en.wikipedia.org/wiki/${encodeURIComponent(t.replace(/ /g,'_'))}>`).join(' ');
  const q = `SELECT ?article ?itemLabel ?start ?end WHERE {
    VALUES ?article { ${values} }
    ?article schema:about ?item .
    OPTIONAL { ?item wdt:P571 ?start }
    OPTIONAL { ?item wdt:P576 ?end }
    OPTIONAL { ?item wdt:P582 ?end }
    SERVICE wikibase:label { bd:serviceParam wikibase:language "en". }
  }`;
  const j = await sparql(q);
  const map = new Map();
  j.results.bindings.forEach(b=>{
    const t = decodeURIComponent(b.article.value.split('/wiki/')[1]).replace(/_/g,' ');
    if(!map.has(t)) map.set(t, {
      title:t, name:(b.itemLabel&&b.itemLabel.value)||t,
      start:b.start?yearOf(b.start.value):null,
      end:b.end?yearOf(b.end.value):null
    });
  });
  const out = titles.map(t=>map.get(t)).filter(Boolean);
  cache.set(key, out);
  return out;
}

/* ---------- QUIZ (shared engine) ---------- */
async function buildQuestions(scopeTitle, want){
  const scope = scopeTitle ? REGISTRY.find(r=>r.title===scopeTitle) : null;
  const allK = REGISTRY.flatMap(r=>r.k.map(t=>({t, owner:r})));
  const dates = await fetchDates(scope ? scope.k : allK.map(x=>x.t));
  const dated = dates.filter(d=>d.start!=null);
  const qs = [];

  const pool = shuffle(dated);
  for(let i=0;i+1<pool.length && qs.length<8;i+=2){
    const [a,b] = [pool[i], pool[i+1]];
    if(a.start===b.start) continue;
    const first = a.start<b.start ? a : b, second = a.start<b.start ? b : a;
    qs.push({
      kind:'Chronology', text:`Which rose first?`,
      opts: shuffle([a.name, b.name]), answer:first.name,
      why:`${first.name} — founded ${fmtYear(first.start)}, before ${second.name} (${fmtYear(second.start)}).`
    });
  }
  shuffle(dated).slice(0,5).forEach(d=>{
    const offs = shuffle([120,-180,260,-90,340,-300]).slice(0,3);
    qs.push({
      kind:'Founding', text:`When was ${d.name} founded?`,
      opts: shuffle([fmtYear(d.start), ...offs.map(o=>fmtYear(d.start+o))]),
      answer: fmtYear(d.start),
      why:`${d.name} was founded around ${fmtYear(d.start)}.`
    });
  });
  if(!scope){
    shuffle(allK).slice(0,5).forEach(({t, owner})=>{
      const others = shuffle(REGISTRY.filter(r=>r!==owner)).slice(0,3).map(r=>r.name);
      qs.push({
        kind:'Peoples', text:`${t} — whose story is it part of?`,
        opts: shuffle([owner.name, ...others]), answer: owner.name,
        why:`${t} belongs to the story of the ${owner.name}.`
      });
    });
  }
  try{
    const who = scope || shuffle(REGISTRY)[0];
    const s = await summary(who.title);
    if(s.thumbnail){
      const others = shuffle(REGISTRY.filter(r=>r!==who)).slice(0,3).map(r=>r.name);
      qs.push({
        kind:'From the archive', text:`This image comes from whose record?`,
        img:s.thumbnail.source, opts:shuffle([who.name, ...others]), answer:who.name,
        why:`That's from the ${who.name} record in the open archive.`
      });
    }
  }catch(e){}
  return shuffle(qs).slice(0, want || (scope ? 3 : 8));
}

async function renderQuiz(scopeTitle){
  setNav(scopeTitle?'':'quiz');
  const scope = scopeTitle ? REGISTRY.find(r=>r.title===scopeTitle) : null;
  app.innerHTML = `<div class="quiz-shell">
    <div class="section-head" style="margin-top:34px"><span class="k">${scope?'Prove it':'Quiz mode'}</span>
    <h2>${scope?('Quick three on the '+esc(scope.name)):'How well do you know the continent?'}</h2></div>
    <div class="status"><span class="spin"></span>Forging questions from the live archive…</div>
  </div>`;
  let qs;
  try{ qs = await buildQuestions(scopeTitle); }
  catch(e){ app.innerHTML = `<div class="quiz-shell">${FAIL_NOTE}<button class="back" onclick="location.hash='#/'">← Back to the map</button></div>`; return; }
  if(!qs.length){ app.innerHTML = `<div class="quiz-shell">${FAIL_NOTE}</div>`; return; }

  let i=0, score=0, streak=0;
  const shell = ()=>`<div class="quiz-shell">
    <div class="q-top">
      <span class="q-score">Score <b>${score}</b>/${qs.length}</span>
      <span class="q-streak">Streak <b>${streak>1?streak+' 🔥':streak}</b></span>
      <span class="q-score">${i+1} of ${qs.length}</span>
    </div>
    <div class="q-bar"><i style="width:${(i/qs.length)*100}%"></i></div>
    <div class="q-card" id="qcard"></div>
  </div>`;

  function draw(){
    if(i>=qs.length){ return final(); }
    app.innerHTML = shell();
    const q = qs[i];
    const card = document.getElementById('qcard');
    card.innerHTML = `
      <div class="q-kind">${esc(q.kind)}</div>
      ${q.img?`<div class="q-img"><img src="${esc(q.img)}" alt=""></div>`:''}
      <h3>${esc(q.text)}</h3>
      <div class="q-opts">${q.opts.map(o=>`<button class="q-opt">${esc(o)}</button>`).join('')}</div>
      <div id="qwhy"></div>`;
    card.querySelectorAll('.q-opt').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        const right = btn.textContent === q.answer;
        card.querySelectorAll('.q-opt').forEach(b=>{
          b.disabled = true;
          if(b.textContent===q.answer) b.classList.add('right');
        });
        if(right){
          score++; streak++; sfx('right');
          const r = btn.getBoundingClientRect();
          confettiBurst(r.left+r.width/2, r.top);
        } else { streak=0; btn.classList.add('wrong'); sfx('wrong'); }
        document.getElementById('qwhy').innerHTML = `
          <p class="q-why">${right?'Correct! ':''}${esc(q.why)}</p>
          <button class="q-next">${i+1<qs.length?'Next question →':'See my result →'}</button>`;
        card.querySelector('.q-next').addEventListener('click', ()=>{ i++; draw(); });
      });
    });
  }
  function final(){
    const pct = Math.round(score/qs.length*100);
    const word = pct===100?'Griot level. Flawless.':pct>=70?'Strong. The ancestors nod.':pct>=40?'Solid start — the map awaits.':'Every explorer starts somewhere.';
    app.innerHTML = `<div class="quiz-shell"><div class="q-card q-final">
      <div class="big">${score}/${qs.length}</div>
      <p style="font-size:19px;margin:10px 0 22px">${word}</p>
      <button class="cta hot" style="margin:0" id="again">Run it back</button>
      <button class="cta" style="margin:0 0 0 8px" id="map">Explore the map</button>
      ${shareBar(`I scored ${score}/${qs.length} on the ÌTÀN African history quiz 🌍 Think you can beat me?`,
      scope ? `share/${slugOf(scope.name)}.html?go=quiz` : 'share/quiz.html')}
    </div></div>`;
    bindShare(app);
    if(pct>=70){ sfx('win'); confettiBurst(innerWidth/2, innerHeight/3); }
    document.getElementById('again').addEventListener('click', ()=>renderQuiz(scopeTitle));
    document.getElementById('map').addEventListener('click', ()=>location.hash='#/');
  }
  draw();
}

let INDEX_DATA = null;
const IDX_COLORS = ['var(--west)','var(--south)','var(--horn)','var(--east)','var(--north)','var(--sahara)'];
async function renderIndex(){
  setNav('index');
  app.innerHTML = `
    <div class="section-head" style="margin-top:34px"><span class="k">The long roll</span>
    <h2>Every people the archive knows</h2></div>
    <p style="color:var(--cream-dim);max-width:640px">Discovered live from Wikidata — peoples indigenous to the African continent,
    ordered by how widely the world has written about them.</p>
    <input class="search" id="q" type="search" placeholder="Search peoples — Fon, Maasai, San, Tigray…" aria-label="Search peoples">
    <div id="list"><div class="status"><span class="spin"></span>Calling the roll — this query walks the whole continent…</div></div>
  `;
  const list = document.getElementById('list');
  try{
    if(!INDEX_DATA){
      const q = `SELECT DISTINCT ?item ?itemLabel ?article (SAMPLE(?cl) AS ?country) (MAX(?sl) AS ?links) WHERE {
        ?item wdt:P31 wd:Q41710 .
        { ?item wdt:P2341 ?c . } UNION { ?item wdt:P17 ?c . }
        ?c wdt:P30 wd:Q15 .
        ?c rdfs:label ?cl . FILTER(LANG(?cl)="en")
        ?item wikibase:sitelinks ?sl .
        ?article schema:about ?item ; schema:isPartOf <https://en.wikipedia.org/> .
        SERVICE wikibase:label { bd:serviceParam wikibase:language "en". }
      } GROUP BY ?item ?itemLabel ?article ORDER BY DESC(?links) LIMIT 400`;
      const j = await sparql(q);
      const seen = new Set();
      INDEX_DATA = j.results.bindings.map(b=>({
        qid:b.item.value.split('/').pop(),
        name:b.itemLabel.value,
        country:b.country?b.country.value:'',
        title:decodeURIComponent(b.article.value.split('/wiki/')[1]).replace(/_/g,' ')
      })).filter(x=>{ if(seen.has(x.qid)) return false; seen.add(x.qid); return !/^Q\d+$/.test(x.name); });
    }
    drawIndex(INDEX_DATA);
    document.getElementById('q').addEventListener('input', e=>{
      const v = e.target.value.trim().toLowerCase();
      drawIndex(INDEX_DATA.filter(x=>x.name.toLowerCase().includes(v)||x.country.toLowerCase().includes(v)));
    });
  }catch(e){ list.innerHTML = FAIL_NOTE; }

  function drawIndex(rows){
    list.innerHTML = `<p class="mono" style="font-size:11px;letter-spacing:.1em;color:var(--cream-dim);margin-bottom:12px">${rows.length} PEOPLES ON THE ROLL</p>
      <div class="idx-grid">${rows.map((x,n)=>`
      <button class="idx-item" data-t="${esc(x.title)}" style="--ac:${IDX_COLORS[n%6]}">
        <div class="nm">${esc(x.name)}</div>
        <div class="c">${esc(x.country||'Africa')}</div>
      </button>`).join('')}</div>`;
    list.querySelectorAll('.idx-item').forEach(b=>{
      b.addEventListener('click', ()=>location.hash='#/people/'+encodeURIComponent(b.dataset.t));
    });
  }
}
